name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Scheme name'
        required: true
        default: 'MapApp'
      destination:
        description: 'Build destination (e.g., generic/platform=iOS Simulator)'
        required: false
        default: 'generic/platform=iOS Simulator'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Check Xcode version
        run: xcodebuild -version

      - name: Check available schemes
        run: |
          xcodebuild -project MapApp.xcodeproj -list || \
          xcodebuild -workspace MapApp.xcworkspace -list || \
          echo "No xcodeproj/xcworkspace found, using SPM"

      - name: Build iOS project (SPM)
        run: |
          xcodebuild build \
            -scheme ${{ inputs.scheme || 'MapApp' }} \
            -destination '${{ inputs.destination || 'generic/platform=iOS Simulator' }}' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create Assets.xcassets
        run: |
          mkdir -p MapApp/Resources/Assets.xcassets/AppIcon.appiconset
          echo '{"images":[{"idiom":"iphone","size":"20x20","scale":"2x"},{"idiom":"iphone","size":"20x20","scale":"3x"},{"idiom":"iphone","size":"29x29","scale":"2x"},{"idiom":"iphone","size":"29x29","scale":"3x"},{"idiom":"iphone","size":"40x40","scale":"2x"},{"idiom":"iphone","size":"40x40","scale":"3x"},{"idiom":"iphone","size":"60x60","scale":"2x"},{"idiom":"iphone","size":"60x60","scale":"3x"}],"info":{"version":1,"author":"xcode"}}' > MapApp/Resources/Assets.xcassets/AppIcon.appiconset/Contents.json
          echo '{"info":{"author":"xcode","version":1}}' > MapApp/Resources/Assets.xcassets/Contents.json

      - name: Build IPA
        run: |
          xcodebuild -scheme ${{ inputs.scheme || 'MapApp' }} \
            -destination '${{ inputs.destination || 'generic/platform=iOS Simulator' }}' \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        run: |
          cd DerivedData/Build/Products/Release-iphoneos
          mkdir -p Payload
          if [ -d "MapApp.app" ]; then
            cp -r MapApp.app Payload/
          fi
          zip -r MapApp.ipa Payload
          ls -la

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MapApp-IPA
          path: DerivedData/Build/Products/Release-iphoneos/MapApp.ipa
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: DerivedData/Logs
          retention-days: 7
